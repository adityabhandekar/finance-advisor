version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: financeadvisor-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: financeadvisor-backend
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: financeadvisor-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data: